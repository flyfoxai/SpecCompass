<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="780" viewBox="0 0 1180 780" role="img" aria-labelledby="title desc">
<title id="title">SpecCompass 分层处理流程</title>
<desc id="desc">从需求到实现逐层下沉；flow 和 UI 在 Web 审核页集中确认，确认文档控制后续阶段。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbfb"/>
      <stop offset="100%" stop-color="#eef7f6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#203b36" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#245f52"/>
    </marker>
    <style>
      .title { font: 760 32px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #11342f; letter-spacing: 0; }
      .subtitle { font: 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4a625d; letter-spacing: 0; }
      .card-title { font: 720 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #11342f; letter-spacing: 0; }
      .card-text { font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4a625d; letter-spacing: 0; }
      .tag { font: 700 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff; letter-spacing: 0; }
      .small { font: 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4a625d; letter-spacing: 0; }
      .note { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #11342f; letter-spacing: 0; }
      .rail-title { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #11342f; letter-spacing: 0; }
      .rail-text { font: 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4a625d; letter-spacing: 0; }
      .arrow { stroke: #245f52; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #6d5932; stroke-width: 2.3; stroke-dasharray: 7 7; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

<rect width="1180" height="780" rx="28" fill="url(#bg)"/>
<circle cx="1035" cy="105" r="145" fill="#0ABAB5" opacity="0.10"/>
<text x="58" y="64" class="title">SpecCompass 分层处理流程</text>
<text x="58" y="92" class="subtitle">从需求到实现逐层下沉；flow 和 UI 在 Web 审核页集中确认，确认文档控制后续阶段。</text>
<rect x="136" y="126" width="908" height="70" rx="18" fill="#fff" filter="url(#shadow)"/>
<rect x="136" y="126" width="146" height="70" rx="18" fill="#17483d"/>
<text x="209" y="157" class="tag" text-anchor="middle">Layer 1</text>
<text x="209" y="178" class="tag" text-anchor="middle">需求入口</text>
<text x="316" y="155" class="card-title">/sp.prd  /sp.specify  /sp.clarify</text>
<text x="316" y="179" class="card-text">明确目标、范围、来源、约束和人工决策。</text>
<path d="M590 202 L590 210" class="arrow"/>
<rect x="136" y="218" width="908" height="70" rx="18" fill="#fff" filter="url(#shadow)"/>
<rect x="136" y="218" width="146" height="70" rx="18" fill="#245f52"/>
<text x="209" y="249" class="tag" text-anchor="middle">Layer 2</text>
<text x="209" y="270" class="tag" text-anchor="middle">方案边界</text>
<text x="316" y="247" class="card-title">/sp.plan</text>
<text x="316" y="271" class="card-text">拆分 workset、影响半径、依赖和实现准入。</text>
<path d="M590 294 L590 302" class="arrow"/>
<rect x="136" y="310" width="908" height="70" rx="18" fill="#fff" filter="url(#shadow)"/>
<rect x="136" y="310" width="146" height="70" rx="18" fill="#0ABAB5"/>
<text x="209" y="341" class="tag" text-anchor="middle">Layer 3</text>
<text x="209" y="362" class="tag" text-anchor="middle">Flow Web 确认</text>
<text x="316" y="339" class="card-title">/sp.flow → flow-review-data.json → flow-confirmation.md</text>
<text x="316" y="363" class="card-text">用直观流程图确认模块、流程、节点判断和推荐选项。</text>
<path d="M590 386 L590 394" class="arrow"/>
<rect x="136" y="402" width="908" height="70" rx="18" fill="#fff" filter="url(#shadow)"/>
<rect x="136" y="402" width="146" height="70" rx="18" fill="#2f6e7c"/>
<text x="209" y="433" class="tag" text-anchor="middle">Layer 4</text>
<text x="209" y="454" class="tag" text-anchor="middle">UI Web 确认</text>
<text x="316" y="431" class="card-title">/sp.ui → ui-review-data.json → ui-confirmation.md</text>
<text x="316" y="455" class="card-text">用界面预览确认页面、区域、组件、状态和交互选择。</text>
<path d="M590 478 L590 486" class="arrow"/>
<rect x="136" y="494" width="908" height="70" rx="18" fill="#fff" filter="url(#shadow)"/>
<rect x="136" y="494" width="146" height="70" rx="18" fill="#6d5932"/>
<text x="209" y="525" class="tag" text-anchor="middle">Layer 5</text>
<text x="209" y="546" class="tag" text-anchor="middle">任务与实现</text>
<text x="316" y="523" class="card-title">/sp.tasks  /sp.implement</text>
<text x="316" y="547" class="card-text">只把已授权事实转成 Mode: impl，并用当前验证证据收尾。</text>
<path d="M590 570 L590 578" class="arrow"/>
<rect x="136" y="586" width="908" height="70" rx="18" fill="#fff" filter="url(#shadow)"/>
<rect x="136" y="586" width="146" height="70" rx="18" fill="#344f67"/>
<text x="209" y="617" class="tag" text-anchor="middle">Layer 6</text>
<text x="209" y="638" class="tag" text-anchor="middle">分析与准入</text>
<text x="316" y="615" class="card-title">/sp.analyze  /sp.gate</text>
<text x="316" y="639" class="card-text">发现漂移、阻塞和缺口；能修则修，不能修才向上路由。</text>
<path d="M1044 620 C1110 560 1110 220 1048 158" class="dash"/>
<text x="1062" y="375" class="small">feedback</text>
<rect x="136" y="704" width="908" height="44" rx="18" fill="#e6f7f5" stroke="#0ABAB5"/>
<text x="162" y="731" class="note">质量规则：文档或代码仍有模型可修复问题时继续完善；需要人工信息或授权时才保留阻塞说明。</text>
</svg>
