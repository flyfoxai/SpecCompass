<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="690" viewBox="0 0 1180 690" role="img" aria-labelledby="title desc">
<title id="title">SpecCompass 多层次处理流程</title>
<desc id="desc">根据项目现状智能选路，完成 Flow/UI 确认，并在实现前用 analyze/gate 收口。</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f7fcfb"/>
    <stop offset="100%" stop-color="#eef8f7"/>
  </linearGradient>
  <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0ABAB5"/>
    <stop offset="100%" stop-color="#058f8b"/>
  </linearGradient>
  <filter id="shadow" x="-12%" y="-18%" width="124%" height="145%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#173c37" flood-opacity="0.13"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#19756f"/>
  </marker>
  <style>
.title { font: 760 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#11342f; letter-spacing:0; }
.subtitle { font: 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#516662; letter-spacing:0; }
.kicker { font: 720 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#0b7772; letter-spacing:0; }
.card-title { font: 760 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#123b35; letter-spacing:0; }
.card-sub { font: 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#49625d; letter-spacing:0; }
.card-small { font: 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#60736f; letter-spacing:0; }
.command { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#11342f; letter-spacing:0; }
.badge { font: 720 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#fff; letter-spacing:0; }
.note { font: 720 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#143b35; letter-spacing:0; }
.muted { font: 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#60736f; letter-spacing:0; }
</style>
</defs>

<rect width="1180" height="690" rx="30" fill="url(#bg)"/>
<circle cx="1028" cy="104" r="150" fill="#0ABAB5" opacity="0.10"/>
<circle cx="108" cy="606" r="162" fill="#0ABAB5" opacity="0.08"/>
<text x="58" y="66" class="title">SpecCompass 多层次处理流程</text>
<text x="58" y="94" class="subtitle">根据项目现状智能选路，完成 Flow/UI 确认，并在实现前用 analyze/gate 收口。</text>
<rect x="52" y="150" width="140" height="116" rx="24" fill="#ffffff" stroke="#d5e4e1" filter="url(#shadow)"/>
<text x="122" y="192" class="card-title" text-anchor="middle">意图</text>
<text x="122" y="220" class="muted" text-anchor="middle">问题和范围</text>
<text x="122" y="246" class="kicker" text-anchor="middle">PRD / Spec</text>
<path d="M200 208 L208 208" stroke="#19756f" stroke-width="2.4" marker-end="url(#arrow)" fill="none"/>
<rect x="212" y="150" width="140" height="116" rx="24" fill="#ffffff" stroke="#d5e4e1" filter="url(#shadow)"/>
<text x="282" y="192" class="card-title" text-anchor="middle">智能路由</text>
<text x="282" y="220" class="muted" text-anchor="middle">下一安全命令</text>
<text x="282" y="246" class="kicker" text-anchor="middle">Route</text>
<path d="M360 208 L368 208" stroke="#19756f" stroke-width="2.4" marker-end="url(#arrow)" fill="none"/>
<rect x="372" y="150" width="140" height="116" rx="24" fill="#0ABAB5" stroke="#0ABAB5" filter="url(#shadow)"/>
<text x="442" y="192" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="760" fill="#ffffff" text-anchor="middle">Flow 确认</text>
<text x="442" y="220" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#e9fffd" text-anchor="middle">业务流程</text>
<text x="442" y="246" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Flow review</text>
<path d="M520 208 L528 208" stroke="#19756f" stroke-width="2.4" marker-end="url(#arrow)" fill="none"/>
<rect x="532" y="150" width="140" height="116" rx="24" fill="#0ABAB5" stroke="#0ABAB5" filter="url(#shadow)"/>
<text x="602" y="192" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="760" fill="#ffffff" text-anchor="middle">UI 确认</text>
<text x="602" y="220" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#e9fffd" text-anchor="middle">界面结构</text>
<text x="602" y="246" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">UI review</text>
<path d="M680 208 L688 208" stroke="#19756f" stroke-width="2.4" marker-end="url(#arrow)" fill="none"/>
<rect x="692" y="150" width="140" height="116" rx="24" fill="#ffffff" stroke="#d5e4e1" filter="url(#shadow)"/>
<text x="762" y="192" class="card-title" text-anchor="middle">计划/任务</text>
<text x="762" y="220" class="muted" text-anchor="middle">交付边界</text>
<text x="762" y="246" class="kicker" text-anchor="middle">Bundle / Plan</text>
<path d="M840 208 L848 208" stroke="#19756f" stroke-width="2.4" marker-end="url(#arrow)" fill="none"/>
<rect x="852" y="150" width="140" height="116" rx="24" fill="#ffffff" stroke="#d5e4e1" filter="url(#shadow)"/>
<text x="922" y="192" class="card-title" text-anchor="middle">分析/准入</text>
<text x="922" y="220" class="muted" text-anchor="middle">实现前收口</text>
<text x="922" y="246" class="kicker" text-anchor="middle">Analyze / Gate</text>
<path d="M1000 208 L1008 208" stroke="#19756f" stroke-width="2.4" marker-end="url(#arrow)" fill="none"/>
<rect x="1012" y="150" width="140" height="116" rx="24" fill="#ffffff" stroke="#d5e4e1" filter="url(#shadow)"/>
<text x="1082" y="192" class="card-title" text-anchor="middle">实现</text>
<text x="1082" y="220" class="muted" text-anchor="middle">已授权工作</text>
<text x="1082" y="246" class="kicker" text-anchor="middle">Implement</text>
<rect x="278" y="344" width="624" height="116" rx="28" fill="#ffffff" stroke="#0ABAB5" stroke-width="2.2" filter="url(#shadow)"/>
<rect x="304" y="370" width="150" height="32" rx="16" fill="url(#aqua)"/>
<text x="379" y="392" class="badge" text-anchor="middle">确认文档</text>
<text x="486" y="392" class="card-title">flow-confirmation.md / ui-confirmation.md</text>
<text x="486" y="424" class="card-sub">后续开发的授权依据</text>
<path d="M442 280 C442 304 456 322 486 344" stroke="#19756f" stroke-width="2.2" marker-end="url(#arrow)" fill="none"/>
<path d="M602 280 C602 304 600 322 590 344" stroke="#19756f" stroke-width="2.2" marker-end="url(#arrow)" fill="none"/>
<path d="M902 402 C1022 374 1016 232 940 204" stroke="#9a6a18" stroke-width="2.2" stroke-dasharray="7 7" marker-end="url(#arrow)" fill="none"/>
<text x="1012" y="358" class="muted" text-anchor="middle">回到上层修正</text>
<rect x="136" y="544" width="908" height="56" rx="22" fill="#e7f7f5" stroke="#b9e4df"/>
<text x="590" y="579" class="note" text-anchor="middle">原则：模型能修的问题继续修；需要人工判断的问题才进入确认。</text>
</svg>
