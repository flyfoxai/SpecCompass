<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">SpecCompass AI engineering control loop</title>
  <desc id="desc">A control-loop diagram showing how SpecCompass routes requirements through specify, clarify, plan, flow, UI, tasks, implementation, analyze, gate, and memory feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f1e7"/>
      <stop offset="55%" stop-color="#edf4ef"/>
      <stop offset="100%" stop-color="#e7eef8"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#12483b"/>
      <stop offset="100%" stop-color="#276b5b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#263b35" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#31564f"/>
    </marker>
    <style>
      .title { font: 700 30px Georgia, serif; fill: #14362f; }
      .subtitle { font: 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #46615a; }
      .box-title { font: 700 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #102d28; }
      .box-text { font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #4d625d; }
      .dark-title { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; }
      .dark-text { font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #dbe9e5; }
      .pill { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #164137; }
      .line { fill: none; stroke: #31564f; stroke-width: 2.4; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #79938c; stroke-width: 2; stroke-dasharray: 6 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1180" height="640" rx="28" fill="url(#bg)"/>
  <circle cx="1020" cy="86" r="150" fill="#ffffff" opacity="0.36"/>
  <circle cx="116" cy="576" r="170" fill="#ffffff" opacity="0.28"/>

  <text x="60" y="66" class="title">SpecCompass control loop</text>
  <text x="60" y="94" class="subtitle">Keep AI work bounded: specify the trunk, connect flow to UI/API/data/tests, implement in small tasks, then analyze and gate with evidence.</text>

  <rect x="60" y="140" width="185" height="96" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="82" y="174" class="box-title">User intent / PRD</text>
  <text x="82" y="199" class="box-text">Goal, scope, constraints</text>
  <text x="82" y="218" class="box-text">and success criteria</text>

  <rect x="310" y="126" width="195" height="124" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="332" y="160" class="box-title">/sp.specify</text>
  <text x="332" y="185" class="box-text">Create or update feature</text>
  <text x="332" y="204" class="box-text">requirements; detect</text>
  <text x="332" y="223" class="box-text">conflicts early</text>

  <rect x="570" y="126" width="195" height="124" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="592" y="160" class="box-title">/sp.plan</text>
  <text x="592" y="185" class="box-text">Architecture route,</text>
  <text x="592" y="204" class="box-text">worksets, impact radius,</text>
  <text x="592" y="223" class="box-text">agent boundaries</text>

  <rect x="830" y="126" width="230" height="124" rx="20" fill="url(#primary)" filter="url(#shadow)"/>
  <text x="854" y="160" class="dark-title">/sp.flow as backbone</text>
  <text x="854" y="185" class="dark-text">Business process connects</text>
  <text x="854" y="204" class="dark-text">UI, events, API, data, tests,</text>
  <text x="854" y="223" class="dark-text">and implementation anchors</text>

  <rect x="170" y="340" width="195" height="124" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="192" y="374" class="box-title">/sp.clarify</text>
  <text x="192" y="399" class="box-text">Ask only when the</text>
  <text x="192" y="418" class="box-text">model cannot safely</text>
  <text x="192" y="437" class="box-text">decide business intent</text>

  <rect x="430" y="340" width="195" height="124" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="452" y="374" class="box-title">/sp.ui + /sp.tasks</text>
  <text x="452" y="399" class="box-text">Screens derive from flow;</text>
  <text x="452" y="418" class="box-text">tasks stay small and</text>
  <text x="452" y="437" class="box-text">verifiable</text>

  <rect x="690" y="340" width="195" height="124" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="712" y="374" class="box-title">/sp.implement</text>
  <text x="712" y="399" class="box-text">Code, tests, evidence,</text>
  <text x="712" y="418" class="box-text">state updates, and</text>
  <text x="712" y="437" class="box-text">bounded write sets</text>

  <rect x="950" y="340" width="170" height="124" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="972" y="374" class="box-title">/sp.analyze</text>
  <text x="972" y="399" class="box-text">Find drift, broken</text>
  <text x="972" y="418" class="box-text">trace links, risks,</text>
  <text x="972" y="437" class="box-text">and stale context</text>

  <rect x="785" y="520" width="210" height="72" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="810" y="552" class="box-title">/sp.gate</text>
  <text x="810" y="576" class="box-text">PASS, FAIL, or NEEDS_DECISION</text>

  <rect x="84" y="520" width="520" height="72" rx="18" fill="#fff9ea" stroke="#d0b56a" stroke-width="1.5"/>
  <text x="108" y="551" class="box-title">Memory / trace / open-items feedback</text>
  <text x="108" y="576" class="box-text">Stable facts are written back; risks and unresolved references are not hidden in chat history.</text>

  <rect x="62" y="280" width="1000" height="34" rx="17" fill="#dfeae6" stroke="#bfd1cb"/>
  <text x="86" y="302" class="pill">Lightweight multi-agent rule: coordinator assigns bounded worksets; workers write only allowed files; analyze/gate reconcile conflicts.</text>

  <path d="M245 188 L306 188" class="line"/>
  <path d="M505 188 L566 188" class="line"/>
  <path d="M765 188 L826 188" class="line"/>
  <path d="M945 250 C900 304 835 332 788 338" class="line"/>
  <path d="M690 402 L628 402" class="line"/>
  <path d="M430 402 L368 402" class="line"/>
  <path d="M626 402 L686 402" class="line"/>
  <path d="M885 402 L946 402" class="line"/>
  <path d="M1035 464 C1010 498 967 522 994 554" class="line"/>
  <path d="M785 556 L608 556" class="soft-line"/>
  <path d="M344 520 C290 496 268 470 268 465" class="soft-line"/>
  <path d="M344 520 C448 494 524 468 528 465" class="soft-line"/>
  <path d="M344 520 C626 492 785 468 787 465" class="soft-line"/>
  <path d="M344 520 C270 382 246 265 306 220" class="soft-line"/>
</svg>
