name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION does not exist, proceeding..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          cat > release_notes.md << NOTES_EOF
          ## PRD Level 1: atomic business project decomposition

          This release makes the first PRD outline concrete enough to divide a large product into focused candidate subprojects:

          - \`/sp.prd\` derives Level 1 from source-backed business capability atoms instead of generic project labels.
          - Each atom owns one trigger/input, one owned state, one independently accepted result, and one handoff.
          - Initial generation maps each atom to exactly one business chain and one candidate subproject; merging remains a user-visible choice.
          - Recovery and governance remain separate from normal business delivery.
          - CLI and browser validators enforce the same ownership rules.
          - Existing projects must refresh their installed templates after upgrading the CLI.

          ## Install

          \`\`\`bash
          uv tool install specify-cli --from git+https://github.com/flyfoxai/SpecCompass.git@${VERSION}
          specify init my-project --integration codex
          \`\`\`

          NOTES_EOF

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}
          gh release create "$VERSION" \
            --title "SpecCompass - $VERSION_NO_V" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
