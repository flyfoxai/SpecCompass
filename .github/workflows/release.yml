name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION does not exist, proceeding..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          cat > release_notes.md << NOTES_EOF
          ## Outline review: consistent cross-map branches

          This release keeps the Outline overview and branch detail maps aligned to the same hierarchy:

          - The overview third column projects each linked child map's root-level nodes from the same source used by its detail map.
          - Every projected node connects to its owning second-level map link instead of reusing the detail map's internal parent identifier.
          - Collision-safe preview keys preserve all projected nodes when identifiers repeat across maps.
          - Empty child maps remain explicit, while clicking a preview opens the detail map and selects the corresponding real node.
          - Validation rejects map links that mix local children with child-map content, preventing competing hierarchy sources.
          - Automated and browser checks cover projected counts, connector ownership, empty maps, and detail-map selection.
          - Existing projects must refresh their installed templates after upgrading the CLI.

          ## Install

          \`\`\`bash
          uv tool install specify-cli --from git+https://github.com/flyfoxai/SpecCompass.git@${VERSION}
          specify init my-project --integration codex
          \`\`\`

          NOTES_EOF

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}
          gh release create "$VERSION" \
            --title "SpecCompass - $VERSION_NO_V" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
