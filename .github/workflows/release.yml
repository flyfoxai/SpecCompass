name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION does not exist, proceeding..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          cat > release_notes.md << NOTES_EOF
          ## Flow/UI Review Confirmation

          This release improves the SpecCompass Flow/UI review workflow:

          - Flow and UI review pages open through the fixed Web renderer with short auto-load parameters.
          - Reviewers can accept recommendations or submit structured natural-language revision requests.
          - Reviewers can apply recommendations to all remaining items or only the current view without overwriting saved choices or drafts.
          - Confirmation-package download checks every module, offers to fill valid remaining recommendations, and blocks unresolved items without a valid recommendation.
          - The review page remains a confirmation surface, not a direct Flow/UI editor.
          - Flow checkpoints identify the business trigger, responsible role, result change, and next responsibility; decision exits must state the real condition or recovery reason.
          - UI screens explain why they exist, who enters them, what users must accomplish, and what result they obtain before showing the product interface.
          - Flow and UI use separate review data contracts: Flow facts support UI decisions as traceable evidence but do not become product controls, branches, or diagrams.

          Release notes intentionally summarize shipped review tooling and user-facing behavior. Methodology documents are not published as the release theme; supporting documentation, tests, and maintenance commits remain tracked in git history and CHANGELOG.md.

          ## Install

          \`\`\`bash
          uv tool install specify-cli --from git+https://github.com/flyfoxai/SpecCompass.git@${VERSION}
          specify init my-project
          \`\`\`

          NOTES_EOF

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}
          gh release create "$VERSION" \
            --title "SpecCompass - $VERSION_NO_V" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
