name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION does not exist, proceeding..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          cat > release_notes.md << NOTES_EOF
          ## PRD Outline and Review Priorities

          This release makes human confirmation more focused:

          - `/sp.prd` now develops Outline maturity in stages. Early discovery offers 2-4 candidates, one recommendation, and direct user input.
          - Mature Outlines receive a visual, identity-bound confirmation before `/sp.specify`.
          - Flow and UI confirmation points now use `critical`, `important`, and `normal` priorities.
          - Critical points are deliberately limited, require a reason, and must be confirmed individually.
          - Existing projects must refresh their installed templates after upgrading the CLI.

          ## Install

          \`\`\`bash
          uv tool install specify-cli --from git+https://github.com/flyfoxai/SpecCompass.git@${VERSION}
          specify init my-project --integration codex
          \`\`\`

          NOTES_EOF

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}
          gh release create "$VERSION" \
            --title "SpecCompass - $VERSION_NO_V" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
