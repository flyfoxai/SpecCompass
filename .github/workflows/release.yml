name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $VERSION already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $VERSION does not exist, proceeding..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          cat > release_notes.md << NOTES_EOF
          ## Outline adjustment mode

          This release adds a controlled adjustment workflow for Outline review without changing the existing three-level hierarchy:

          - The original three-column Outline hierarchy and connectors remain visible in adjustment mode.
          - A right-side workbench presents model proposals, before-and-after comparisons, rationale, impact, maturity, and write-back plans.
          - Non-recommended options can enter a draft revision flow with revision type and requirement capture.
          - High-impact nodes require explicit Owner confirmation before write-back.
          - Adjustment-mode state is persisted locally without expanding the Review schema.
          - Automated and browser checks cover mode switching, proposal review, draft revisions, and confirmation gates.
          - Existing projects must refresh their installed templates after upgrading the CLI.

          ## Install

          \`\`\`bash
          uv tool install specify-cli --from git+https://github.com/flyfoxai/SpecCompass.git@${VERSION}
          specify init my-project --integration codex
          \`\`\`

          NOTES_EOF

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NO_V=${VERSION#v}
          gh release create "$VERSION" \
            --title "SpecCompass - $VERSION_NO_V" \
            --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
